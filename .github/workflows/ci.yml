name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run tests
        run: ./mvnw -B --no-transfer-progress test

  frontend:
    name: Frontend lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      # Hard gate: the frontend is lint-clean (0 errors, 0 warnings) as of the
      # 2026-07-09 audit fixes — a failure here means new lint debt.
      - name: Lint
        run: npm run lint
      # Hard gate: raw hex colors in JSX silently break night mode (theme is
      # CSS-token driven). Allowlist lives in scripts/check-tokens.mjs.
      - name: Theme-token check
        run: npm run check:tokens
      - name: Unit tests
        run: npx vitest run
      - name: Build
        run: npm run build
