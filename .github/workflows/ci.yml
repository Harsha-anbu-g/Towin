name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run tests
        run: ./mvnw -B --no-transfer-progress test

  frontend:
    name: Frontend lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      # Advisory until the 53 pre-existing lint errors are fixed
      # (see docs/superpowers/plans/2026-07-04-test-suite-and-ci-gate.md follow-ups).
      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true
      - name: Unit tests
        run: npx vitest run
      - name: Build
        run: npm run build
