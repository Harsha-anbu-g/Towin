spring:
  autoconfigure:
    exclude: ${SPRING_AUTOCONFIGURE_EXCLUDE:org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/towin}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:${SPRING_REDIS_HOST:localhost}}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      connect-timeout: 1000ms
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: openid,email,profile
        provider:
          google:
            issuer-uri: https://accounts.google.com
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

aws:
  region: ${AWS_REGION:us-east-1}
  access-key: ${AWS_ACCESS_KEY:dummy}
  secret-key: ${AWS_SECRET_KEY:dummy}
  s3:
    bucket: ${AWS_S3_BUCKET:towin-photos}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  oauth:
    frontend-redirect: ${APP_OAUTH_FRONTEND_REDIRECT:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    from-name: ${MAIL_FROM_NAME:ToWin}
    verify-base-url: ${APP_VERIFY_BASE_URL:http://localhost:5173}
    brevo-api-key: ${BREVO_API_KEY:}
  kafka:
    enabled: ${APP_KAFKA_ENABLED:false}
  redis:
    enabled: ${APP_REDIS_ENABLED:false}
  demo:
    # Idempotent, additive demo content (accounts, trust stages, needs,
    # messages, reviews) so the demo is always alive. Safe on every boot.
    seed-enabled: ${APP_DEMO_SEED_ENABLED:true}
    # On each boot, wipe data visitors left on the public demo accounts and
    # re-seed the clean minimal set (one of each type). Set false to keep it.
    reset-enabled: ${APP_DEMO_RESET_ENABLED:true}
    # Event-driven, not a timer: a demo account is reverted to the baseline only
    # after a visitor changes it. This is the quiet period (ms) to wait after the
    # last change before reverting, so an active visitor keeps their changes and
    # everything resets once they go idle. Default 900000 = 15 minutes.
    reset-delay-ms: ${APP_DEMO_RESET_DELAY_MS:900000}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}

posthog:
  api-key: ${POSTHOG_API_KEY:}
  host: ${POSTHOG_HOST:https://us.i.posthog.com}

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
