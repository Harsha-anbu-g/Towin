spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/towin}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:0000}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:${SPRING_REDIS_HOST:localhost}}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

aws:
  region: ${AWS_REGION:us-east-1}
  access-key: ${AWS_ACCESS_KEY:dummy}
  secret-key: ${AWS_SECRET_KEY:dummy}
  s3:
    bucket: ${AWS_S3_BUCKET:towin-photos}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-change-this-in-production-must-be-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  kafka:
    enabled: ${APP_KAFKA_ENABLED:false}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from-number: ${TWILIO_FROM_NUMBER:}

server:
  port: ${PORT:8080}
