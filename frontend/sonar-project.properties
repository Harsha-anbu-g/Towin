# SonarQube analysis settings for the ToWin frontend.
# Read by the "Security - SonarQube (self-hosted, manual)" workflow when it scans
# this directory. The server URL and token are supplied by that workflow at run
# time (they are intentionally NOT stored here).
sonar.projectKey=towin-frontend
sonar.projectName=ToWin Frontend

sonar.sources=src
sonar.tests=src
# Files matching these patterns are treated as tests, not product source.
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.test.ts,**/*.test.tsx,**/*.spec.js,**/*.spec.jsx,**/*.spec.ts,**/*.spec.tsx,src/test/**

# Never index build output, deps, or coverage artifacts as source.
sonar.exclusions=node_modules/**,dist/**,coverage/**,public/**
# Don't hold test files to code-coverage expectations.
sonar.coverage.exclusions=**/*.test.*,**/*.spec.*,src/test/**

# Coverage produced by `vitest run --coverage --coverage.reporter=lcov`.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
