<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ToWin: Connecting Generations</title>
    <meta name="description" content="ToWin connects elders with trusted younger helpers nearby — for friendship, help with daily tasks, and good company. Trust grows one step at a time. It takes two To Win." />
    <meta name="theme-color" content="#4FA3CE" />

    <!-- Apply the saved night-mode choice before first paint so a signed-in
         dark-mode user never sees a white flash. Night mode is members-only, so
         we only apply it when a login token is present — the landing, login and
         create-account pages (signed out) always stay light. ThemeContext owns
         it after mount. -->
    <script>
      try {
        if (localStorage.getItem('token') && localStorage.getItem('towin-theme') === 'dark') {
          document.documentElement.dataset.theme = 'dark';
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#201f1d');
        }
      } catch (e) { /* storage blocked — stay light */ }
    </script>

    <!-- Newsreader (serif) for headings + the tagline only, at weight 400.
         Italic 600 is loaded just for the gold hero words (real bold italic,
         not browser-synthesized).
         Body text stays on the system SF stack for on-screen/elderly legibility.
         display=swap so text is never invisible while the serif loads. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,600&display=swap" rel="stylesheet" />
    <meta name="description" content="ToWin connects older adults with trusted helpers nearby — for friendship, errands, and everyday help. It takes two To Win." />

    <!-- Social sharing (Open Graph + Twitter). Absolute URLs are REQUIRED for
         WhatsApp/Facebook/Twitter to fetch the preview image. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ToWin" />
    <meta property="og:url" content="https://towin.vercel.app" />
    <meta property="og:title" content="ToWin — It takes two To Win." />
    <meta property="og:description" content="A calm, friendly place that connects older adults with trusted helpers for company and everyday support." />
    <meta property="og:image" content="https://towin.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="ToWin turtle logo" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ToWin — It takes two To Win." />
    <meta name="twitter:description" content="A calm, friendly place that connects older adults with trusted helpers for company and everyday support." />
    <meta name="twitter:image" content="https://towin.vercel.app/og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
