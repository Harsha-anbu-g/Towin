openapi: 3.1.0
info:
  title: ToWin API
  description: REST API for ToWin — connecting elderly people with each other and
    with young helpers. Paste a JWT via the Authorize button to try secured endpoints.
  version: v1
servers:
- url: http://localhost:8080
  description: Generated server url
security:
- bearerAuth: []
