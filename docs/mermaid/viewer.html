<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ToWin — Mermaid diagram viewer</title>
<style>
  :root {
    --bg: #faf6ef; --panel: #ffffff; --ink: #2b2620; --line: #e4dccd;
    --blue: #2f7fd1; --muted: #857c6d;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font: 16px/1.5 -apple-system, "SF Pro Text", system-ui, sans-serif;
    background: var(--bg); color: var(--ink);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 12px 20px; background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 17px; font-weight: 600; white-space: nowrap; }
  select {
    font: inherit; font-size: 15px; padding: 8px 10px; min-width: 320px;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--panel); color: var(--ink);
  }
  .zoom { display: flex; gap: 6px; align-items: center; }
  .zoom button {
    font: inherit; font-size: 15px; min-width: 44px; min-height: 40px;
    padding: 6px 12px; cursor: pointer;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--panel); color: var(--ink);
  }
  .zoom button:hover { border-color: var(--blue); color: var(--blue); }
  .hint { color: var(--muted); font-size: 14px; }
  #stage {
    flex: 1; overflow: hidden; position: relative;
    cursor: grab; touch-action: none;
  }
  #stage.dragging { cursor: grabbing; }
  #canvas { position: absolute; transform-origin: 0 0; }
  #canvas svg { display: block; max-width: none !important; }
  #status {
    position: absolute; inset: 0; display: grid; place-items: center;
    color: var(--muted); font-size: 15px; pointer-events: none;
  }
</style>
</head>
<body>
<header>
  <h1>ToWin diagrams</h1>
  <select id="picker" aria-label="Choose a diagram"></select>
  <div class="zoom">
    <button id="zin"  title="Zoom in">+</button>
    <button id="zout" title="Zoom out">−</button>
    <button id="zfit" title="Fit to window">Fit</button>
    <button id="z100" title="Actual size">100%</button>
  </div>
  <span class="hint">scroll to zoom · drag to pan</span>
</header>
<div id="stage">
  <div id="canvas"></div>
  <div id="status">Loading mermaid…</div>
</div>

  const opt = document.createElement("option");
  opt.value = i;
  opt.textContent = d.title;
  picker.appendChild(opt);
}

let scale = 1, tx = 0, ty = 0;
function apply() {
  canvas.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}
function fit() {
  const svg = canvas.querySelector("svg");
  if (!svg) return;
  const w = svg.viewBox?.baseVal?.width  || svg.getBBox().width  || 1;
  const h = svg.viewBox?.baseVal?.height || svg.getBBox().height || 1;
  scale = Math.min(stage.clientWidth / w, stage.clientHeight / h) * 0.96;
  tx = (stage.clientWidth  - w * scale) / 2;
  ty = (stage.clientHeight - h * scale) / 2;
  apply();
}

let seq = 0;
async function show(i) {
  const d = diagrams[i];
  status.textContent = "Rendering…";
  status.style.display = "grid";
  canvas.innerHTML = "";
  try {
    const { svg } = await mermaid.render("d" + (++seq), d.code);
    canvas.innerHTML = svg;
    const el = canvas.querySelector("svg");
    el.removeAttribute("width");   // let the viewBox drive size via transform
    el.removeAttribute("height");
    const vb = el.viewBox.baseVal;
    el.style.width  = vb.width  + "px";
    el.style.height = vb.height + "px";
    status.style.display = "none";
    fit();
  } catch (e) {
    status.textContent = "This diagram failed to render: " + e.message;
  }
}

picker.addEventListener("change", () => show(+picker.value));

// --- pan ---
let drag = null;
stage.addEventListener("pointerdown", (e) => {
  drag = { x: e.clientX - tx, y: e.clientY - ty };
  stage.classList.add("dragging");
  stage.setPointerCapture(e.pointerId);
});
stage.addEventListener("pointermove", (e) => {
  if (!drag) return;
  tx = e.clientX - drag.x;
  ty = e.clientY - drag.y;
  apply();
});
stage.addEventListener("pointerup", () => {
  drag = null;
  stage.classList.remove("dragging");
});

// --- zoom (cursor-anchored) ---
function zoomAt(cx, cy, factor) {
  const ns = Math.min(8, Math.max(0.02, scale * factor));
  tx = cx - (cx - tx) * (ns / scale);
  ty = cy - (cy - ty) * (ns / scale);
  scale = ns;
  apply();
}
stage.addEventListener("wheel", (e) => {
  e.preventDefault();
  const r = stage.getBoundingClientRect();
  zoomAt(e.clientX - r.left, e.clientY - r.top, e.deltaY < 0 ? 1.15 : 1 / 1.15);
}, { passive: false });

document.getElementById("zin").onclick  = () => zoomAt(stage.clientWidth / 2, stage.clientHeight / 2, 1.3);
document.getElementById("zout").onclick = () => zoomAt(stage.clientWidth / 2, stage.clientHeight / 2, 1 / 1.3);
document.getElementById("zfit").onclick = fit;
document.getElementById("z100").onclick = () => { scale = 1; tx = 20; ty = 20; apply(); };
window.addEventListener("resize", fit);

// deep-link: viewer.html#12-backend-code-flowchart
const want = location.hash.slice(1);
const start = Math.max(0, diagrams.findIndex(d => d.slug === want));
picker.value = start;
show(start);
</script>
